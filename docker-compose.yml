version: '3.8'

services:
  # Lightweight production build (recommended)
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile.lightweight
    ports:
      - "3000:80"
    container_name: 3d-portfolio-app
    environment:
      - NODE_ENV=production
    networks:
      - portfolio-network

  # Production build with Nginx (memory intensive)
  portfolio-prod:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:80"
    container_name: 3d-portfolio-prod
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    networks:
      - portfolio-network

  # Simple production build with serve (memory intensive)
  portfolio-simple:
    build:
      context: .
      dockerfile: Dockerfile.simple
    ports:
      - "3002:3000"
    container_name: 3d-portfolio-simple
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    networks:
      - portfolio-network

  # Development build (memory intensive)
  portfolio-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    container_name: 3d-portfolio-dev
    restart: unless-stopped
    environment:
      - NODE_ENV=development
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - portfolio-network
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

networks:
  portfolio-network:
    driver: bridge
